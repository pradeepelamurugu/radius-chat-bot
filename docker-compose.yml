version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DB_DIR=/app/data
    volumes:
      # Use a named volume to safely persist sqlite without path resolution errors
      - chat-data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  chat-data:
